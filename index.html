<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AsterA Coach · Thai Maliwan Academy</title>
<style>
  :root{
    --ink:#3E4457; --muted:#8B90A3;
    --sky:#8FBFDE; --sky-soft:#DCEBF5; --sky-d:#5f96bd;
    --rose:#E9A6BC; --rose-soft:#F8DEE7; --rose-d:#d3809b;
    --mint:#9BD1B6; --mint-soft:#DEF0E8; --mint-d:#6bb591;
    --gold:#D8B45C; --gold-l:#EAD59A; --gold-d:#b8933f;
    --glass:rgba(255,255,255,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI","Leelawadee UI","Noto Sans Thai",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;padding:22px 12px 40px;overflow-x:hidden;
    background:radial-gradient(760px 520px at 14% 4%,#e7f1f8,transparent),radial-gradient(720px 560px at 88% 12%,#fbe6ee,transparent),radial-gradient(680px 620px at 50% 116%,#e2f2ea,transparent),linear-gradient(160deg,#fdfaf8,#f4f6f7)}
  .orb{position:fixed;border-radius:50%;filter:blur(46px);opacity:.5;pointer-events:none;z-index:0}
  .orb.a{width:280px;height:280px;background:var(--sky-soft);top:-40px;left:-60px}
  .orb.b{width:320px;height:320px;background:var(--rose-soft);bottom:-80px;right:-70px}
  .orb.c{width:240px;height:240px;background:var(--mint-soft);top:44%;left:-90px}
  .topbar{width:100%;max-width:660px;display:flex;justify-content:flex-end;align-items:center;margin-bottom:6px;position:relative;z-index:5}
  .langswitch{display:flex;gap:4px;background:rgba(255,255,255,.8);border:1px solid var(--gold-l);border-radius:30px;padding:4px;backdrop-filter:blur(8px)}
  .langswitch button{border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:800;color:var(--muted);padding:6px 14px;border-radius:24px;transition:.15s}
  .langswitch button.on{background:linear-gradient(120deg,var(--sky-d),var(--rose-d));color:#fff}
  .head{text-align:center;margin-bottom:10px;position:relative;z-index:2}
  .wordmark{font-size:26px;font-weight:800;letter-spacing:.6px;display:inline-flex;align-items:center;gap:11px;background:linear-gradient(100deg,var(--sky-d),var(--rose-d) 55%,var(--mint-d));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lotus-ico{width:27px;height:27px}
  .premium{display:inline-block;margin-left:8px;font-size:10px;font-weight:800;letter-spacing:2px;color:var(--gold-d);border:1px solid var(--gold-l);border-radius:20px;padding:3px 10px;vertical-align:middle;background:#fffdf7}
  .tagline{color:var(--muted);font-size:13px;margin-top:8px}
  .dial{position:relative;width:600px;height:600px;z-index:2;flex:none;touch-action:none;perspective:1200px}
  .pointer{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:8;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:22px solid var(--gold);filter:drop-shadow(0 4px 6px rgba(184,147,63,.5))}
  .pointer::after{content:"";position:absolute;left:-8px;top:-26px;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff6df,var(--gold));box-shadow:0 3px 8px rgba(184,147,63,.6)}
  .wheel{position:absolute;inset:10px;z-index:3;cursor:grab;transform-origin:50% 50%;will-change:transform}
  .wheel.grab{cursor:grabbing}
  .wheel.snap{transition:transform .5s cubic-bezier(.18,.9,.22,1)}
  .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from -90deg,var(--mint) 0deg 72deg,var(--rose) 72deg 108deg,var(--sky-soft) 108deg 360deg);box-shadow:0 40px 80px rgba(70,90,120,.28),inset 0 6px 12px rgba(255,255,255,.75),inset 0 -14px 26px rgba(50,70,100,.28),inset 0 0 0 2px rgba(255,255,255,.5)}
  .rim{position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(184,147,63,.0) 0deg 2.4deg,rgba(216,180,92,.55) 2.4deg 3deg);-webkit-mask:radial-gradient(circle,transparent 0 47.3%,#000 47.6% 50%,transparent 50.2%);mask:radial-gradient(circle,transparent 0 47.3%,#000 47.6% 50%,transparent 50.2%)}
  .rim2{position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,#f8ecd2,#c9ab68,#fff8e8,#bd9c56,#f8ecd2,#c9ab68,#fff8e8,#bd9c56,#f8ecd2);-webkit-mask:radial-gradient(circle,transparent 0 49%,#000 49.3% 50.4%,transparent 51%);mask:radial-gradient(circle,transparent 0 49%,#000 49.3% 50.4%,transparent 51%);opacity:.85}
  .face{position:absolute;inset:58px;border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(120,145,175,.04) 0deg 8.5deg,rgba(120,145,175,.11) 8.5deg 9deg),radial-gradient(circle at 42% 34%,#ffffff,#eef3f9 70%,#e4ebf3);box-shadow:inset 0 0 0 1px rgba(216,180,92,.30),inset 0 8px 22px rgba(70,90,120,.12)}
  .face .facelotus{position:absolute;inset:0;margin:auto;width:180px;height:180px;color:var(--rose-d);opacity:.05}
  .node{position:absolute;width:70px;height:70px;margin:-35px 0 0 -35px;border-radius:50%;z-index:4;transition:box-shadow .2s,transform .15s;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.95);box-shadow:0 10px 22px rgba(70,90,120,.20),inset 0 2px 3px rgba(255,255,255,.9),inset 0 -6px 12px rgba(70,90,120,.14)}
  .node .nc{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:23px}
  .node small{font-size:9px;font-weight:800;color:var(--muted);margin-top:-1px}
  .node.done{background:rgba(222,240,232,.9);border-color:var(--mint)}
  .node.now{border-color:var(--rose);background:radial-gradient(circle at 40% 34%,#fff,var(--rose-soft));box-shadow:0 0 0 5px rgba(233,166,188,.22),0 12px 26px rgba(211,128,155,.34),inset 0 2px 3px rgba(255,255,255,.9)}
  .node.sel{outline:2.5px solid var(--gold);outline-offset:3px;transform:scale(1.08)}
  .core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:344px;height:344px;border-radius:50%;z-index:6;cursor:pointer;background:var(--glass);backdrop-filter:blur(18px) saturate(1.35);box-shadow:0 20px 46px rgba(70,90,120,.24),inset 0 2px 0 rgba(255,255,255,.95),inset 0 -10px 30px rgba(70,90,120,.14),inset 0 0 0 1px rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 34px;overflow:hidden}
  .core-lotus{position:absolute;left:50%;top:50%;transform:translate(-50%,-52%);width:250px;height:250px;color:var(--rose-d);opacity:.06;z-index:0;pointer-events:none}
  .core>*{position:relative;z-index:1}
  .core .halo{position:absolute;inset:9px;border-radius:50%;border:1px solid rgba(216,180,92,.4);pointer-events:none;z-index:1}
  .ctime{font-size:11px;font-weight:800;letter-spacing:1px;background:linear-gradient(90deg,var(--sky-d),var(--rose-d));-webkit-background-clip:text;background-clip:text;color:transparent}
  .core h2{font-size:22px;font-weight:800;line-height:1.2;margin-top:5px}
  .cel{font-size:12.5px;color:#5b6072;margin-top:7px;min-height:34px;max-width:230px}
  .open-proc{margin-top:14px;border:none;cursor:pointer;color:#fff;font-weight:800;font-size:13.5px;padding:0 22px;height:46px;border-radius:26px;background:linear-gradient(120deg,var(--rose),var(--rose-d));box-shadow:0 10px 22px rgba(211,128,155,.42)}
  .open-proc:hover{filter:brightness(1.05)}
  .core .mini-next{margin-top:9px;background:none;border:none;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer}
  .core .mini-next:hover{color:var(--sky-d)}
  .dock{display:flex;gap:34px;margin-top:16px;position:relative;z-index:2;justify-content:center}
  .dockbtn{display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:none;cursor:pointer}
  .dockbtn .ic{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,.85);box-shadow:0 10px 22px rgba(70,90,120,.18);transition:.16s;background:rgba(255,255,255,.82);backdrop-filter:blur(8px)}
  .dockbtn:hover .ic{transform:translateY(-3px) scale(1.05)}
  .dockbtn.live .ic{background:linear-gradient(120deg,var(--rose),var(--rose-d));border-color:transparent}
  .dockbtn .lot{width:26px;height:26px;color:#fff}
  .dockbtn label{font-size:11.5px;font-weight:800;color:var(--muted)}
  .scrim{position:fixed;inset:0;background:rgba(70,80,110,.34);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.3s;z-index:30}
  .scrim.open{opacity:1;pointer-events:auto}
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-46%) scale(.94);opacity:0;pointer-events:none;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-radius:34px;box-shadow:0 30px 70px rgba(70,80,110,.4),inset 0 0 0 1px rgba(255,255,255,.7);padding:22px;z-index:31;transition:.3s cubic-bezier(.2,.85,.2,1)}
  .modal.open{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
  .mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .mtitle{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800}
  .mtitle .lot{width:26px;height:26px;color:var(--rose-d)}
  .mclose{cursor:pointer;background:#fff;border:1px solid #eee;border-radius:22px;padding:6px 12px;color:var(--muted);font-size:13px;font-weight:700}
  .msub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
  /* stage detail */
  .st-medallion{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:14px}
  .st-badge{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle at 40% 34%,#fff,var(--rose-soft));border:2px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:38px;box-shadow:0 12px 26px rgba(211,128,155,.3)}
  .st-time{margin-top:9px;font-size:11.5px;font-weight:800;letter-spacing:1px;color:var(--rose-d)}
  .st-name{font-size:22px;font-weight:800;line-height:1.15;margin-top:2px}
  .st-goal{font-size:13px;color:#5b6072;margin-top:6px;max-width:340px}
  .st-media{margin:6px 0 14px;height:150px;border-radius:22px;background:linear-gradient(135deg,#e9f0ea,#dbe8e0);border:1px dashed #bcd2c4;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--mint-d);cursor:pointer;position:relative;overflow:hidden}
  .st-media .pl{width:56px;height:56px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--rose-d);box-shadow:0 8px 18px rgba(70,90,120,.18)}
  .st-media small{font-size:11.5px;font-weight:700}
  .st-media iframe,.st-media video{width:100%;height:100%;border:0;border-radius:22px}
  .st-sec{background:#fff;border:1px solid #eef0f4;border-radius:20px;padding:13px 15px;margin-bottom:11px}
  .st-sec .lab{display:flex;align-items:center;gap:9px;font-size:11.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--sky-d);margin-bottom:7px}
  .st-sec .ic{width:28px;height:28px;border-radius:9px;background:var(--sky-soft);display:flex;align-items:center;justify-content:center;font-size:15px}
  .st-sec p{font-size:13.5px;color:#45495a}
  .st-sec.agent{background:linear-gradient(120deg,#fff,#eef7f1);border-color:#d7ecdf}
  .st-sec.agent .ic{background:var(--mint-soft)} .st-sec.agent .lab{color:var(--mint-d)}
  .st-sec.warn{background:linear-gradient(120deg,#fff,var(--rose-soft));border-color:#f3d3de}
  .st-sec.warn .ic{background:#f6d3c0} .st-sec.warn .lab{color:var(--rose-d)} .st-sec.warn p{color:#8a5334}
  .st-sec.sum{background:linear-gradient(120deg,#fffaf0,#f7ecd6);border-color:#ecdcb8}
  .st-sec.sum .ic{background:#f0e2be} .st-sec.sum .lab{color:var(--gold-d)}
  .speak{margin-top:9px;display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;background:var(--mint-d);color:#fff;font-weight:700;font-size:12px;padding:7px 14px;border-radius:22px;box-shadow:0 6px 14px rgba(107,191,151,.35)}
  .speak:hover{filter:brightness(1.06)} .speak.stop{background:var(--rose-d)}
  .qlist{display:flex;flex-direction:column;gap:7px}
  .qrow{display:flex;align-items:center;gap:8px;background:#f7f8fb;border-radius:14px;padding:8px 11px}
  .qrow .qtxt{flex:1;font-size:12.5px}
  .qrow .qspeak{border:none;background:var(--sky-soft);color:var(--sky-d);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px}
  .st-foot{display:flex;gap:9px;margin-top:6px}
  .st-foot .go{flex:1;border:none;cursor:pointer;color:#fff;font-weight:800;font-size:13.5px;height:46px;border-radius:24px;background:linear-gradient(120deg,var(--sky-d),var(--mint-d));box-shadow:0 9px 20px rgba(95,150,189,.42)}
  .st-foot .ask{border:1px solid var(--rose-soft);background:#fff;color:var(--rose-d);font-weight:800;font-size:13px;padding:0 16px;height:46px;border-radius:24px;cursor:pointer}
  /* translator */
  .live-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;color:#fff;background:var(--rose-d);padding:4px 12px;border-radius:20px}
  .live-badge i{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
  .kbtag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;color:var(--mint-d);background:var(--mint-soft);padding:4px 11px;border-radius:20px}
  .mic{margin:6px auto 14px;width:100%;display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#fff,#fbf1f5);border:1px solid var(--rose-soft);border-radius:22px;padding:14px 18px}
  .mic .disc{width:52px;height:52px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;background:radial-gradient(circle at 40% 34%,var(--rose),var(--rose-d));color:#fff;animation:ring 1.6s infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(211,128,155,.5)}70%{box-shadow:0 0 0 16px rgba(211,128,155,0)}100%{box-shadow:0 0 0 0 rgba(211,128,155,0)}}
  .mic .mtxt b{font-size:14px}.mic .mtxt div{font-size:12.5px;color:var(--muted)}
  .inlang{display:flex;gap:7px;margin:2px 0 14px;flex-wrap:wrap;align-items:center}
  .inlang span{font-size:12.5px;color:var(--muted);font-weight:700}
  .lgpill{border:1.5px solid var(--sky-soft);background:#fff;border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer}
  .lgpill.on{background:var(--sky-soft);border-color:var(--sky)}
  .qbubble{background:#fff;border:1px solid #eee;border-radius:18px 18px 18px 6px;padding:12px 15px;margin-bottom:6px}
  .qbubble .who{font-size:11px;font-weight:800;color:var(--rose-d);margin-bottom:3px}
  .arrow{text-align:center;color:var(--muted);font-size:12.5px;margin:8px 0}
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .acard{border-radius:18px;padding:12px 14px;font-size:12.5px;line-height:1.45;position:relative}
  .acard .fl{font-size:11px;font-weight:800;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
  .acard .sp{border:none;background:rgba(255,255,255,.7);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px}
  .acard.pl{background:var(--sky-soft)}.acard.pl .fl{color:var(--sky-d)}
  .acard.th{background:var(--rose-soft)}.acard.th .fl{color:var(--rose-d)}
  .acard.en{background:var(--mint-soft)}.acard.en .fl{color:var(--mint-d)}
  .acard.de{background:#f2ecdc}.acard.de .fl{color:var(--gold-d)}
  .simbtn{width:100%;margin-top:16px;border:none;cursor:pointer;color:#fff;font-weight:800;font-size:14.5px;padding:14px;border-radius:22px;background:linear-gradient(120deg,var(--rose),var(--rose-d));box-shadow:0 12px 26px rgba(211,128,155,.4)}
  .rec{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid #f0eef2;border-radius:20px;padding:12px 14px;margin-bottom:10px}
  .rec .play{width:44px;height:44px;flex:none;border-radius:50%;border:none;cursor:pointer;font-size:16px;color:#fff;background:linear-gradient(120deg,var(--sky-d),var(--mint-d));box-shadow:0 8px 16px rgba(95,150,189,.36)}
  .rec .rinfo{flex:1;min-width:0}
  .rec .rname{font-size:14px;font-weight:700}
  .rec .rmeta{font-size:12px;color:var(--muted);margin-top:1px}
  .wave{display:flex;align-items:flex-end;gap:2px;height:22px;margin-top:6px}
  .wave i{width:3px;background:var(--sky);border-radius:2px;height:6px}
  .rec.playing .wave i{animation:wv .8s ease-in-out infinite}
  .rec.playing .play{background:linear-gradient(120deg,var(--rose),var(--rose-d))}
  @keyframes wv{0%,100%{height:5px}50%{height:20px}}
  .wave i:nth-child(2n){animation-delay:.15s}.wave i:nth-child(3n){animation-delay:.3s}.wave i:nth-child(4n){animation-delay:.45s}.wave i:nth-child(5n){animation-delay:.6s}
  .rec .dl{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px}
  .legend{display:flex;gap:18px;margin-top:18px;flex-wrap:wrap;justify-content:center;position:relative;z-index:2}
  .lg-item{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#6b7085;font-weight:600}
  .swatch{width:14px;height:14px;border-radius:50%}
  .note{max-width:640px;margin:12px auto 0;text-align:center;color:#7c8196;font-size:12.5px;line-height:1.7;position:relative;z-index:2}
  .note b{color:var(--sky-d)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);opacity:0;background:var(--ink);color:#fff;padding:11px 22px;border-radius:30px;font-size:13.5px;font-weight:600;transition:.3s;z-index:40;pointer-events:none;box-shadow:0 14px 34px rgba(0,0,0,.3)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  @media(max-width:660px){.dial{width:370px;height:370px}.face{inset:38px}.node{width:48px;height:48px;margin:-24px 0 0 -24px}.node .nc{font-size:16px}.node small{display:none}.core{width:224px;height:224px;padding:16px}.core h2{font-size:15px}.cel{display:none}.open-proc{margin-top:8px;height:38px;font-size:12px;padding:0 14px}.agrid{grid-template-columns:1fr}}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><defs>
    <symbol id="lotus" viewBox="0 0 64 64"><g fill="currentColor">
      <path d="M32 12c3 6 3 12 0 20-3-8-3-14 0-20z"/>
      <path d="M32 34c-4-6-9-9-15-10 1 7 6 12 15 14 9-2 14-7 15-14-6 1-11 4-15 10z" opacity=".85"/>
      <path d="M32 38C25 33 17 32 9 34c3 8 12 13 23 12 11 1 20-4 23-12-8-2-16-1-23 4z" opacity=".7"/>
      <path d="M32 40c-9-4-19-2-27 2 4 7 15 11 27 10 12 1 23-3 27-10-8-4-18-6-27-2z" opacity=".55"/>
      <ellipse cx="32" cy="48" rx="27" ry="7" opacity=".4"/></g></symbol>
  </defs></svg>
  <div class="orb a"></div><div class="orb b"></div><div class="orb c"></div>

  <div class="topbar">
    <div class="langswitch">
      <button id="lPL" onclick="setLang('PL')" class="on">🇵🇱 Polski</button>
      <button id="lTH" onclick="setLang('TH')">🇹🇭 ไทย</button>
    </div>
  </div>

  <div class="head">
    <div class="wordmark"><svg class="lotus-ico" style="color:var(--rose-d)"><use href="#lotus"/></svg><span>AsterA Coach</span><span class="premium">MALIWAN</span></div>
    <div class="tagline" id="tagline"></div>
  </div>

  <div class="dial" id="dial">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"><div class="ring"></div><div class="rim2"></div><div class="rim"></div><div class="face"><svg class="facelotus"><use href="#lotus"/></svg></div></div>
    <div class="core" id="core" onclick="openStage(active)"></div>
  </div>

  <div class="dock">
    <button class="dockbtn live" onclick="openTr()"><span class="ic"><svg class="lot"><use href="#lotus"/></svg></span><label id="dLive"></label></button>
    <button class="dockbtn" onclick="openRec()"><span class="ic">🎙️</span><label id="dRec"></label></button>
  </div>

  <div class="legend" id="legend"></div>
  <div class="note" id="note"></div>
  <div class="toast" id="toast"></div>

    {src:{TH:"ในช่วงแรกควรกดแรงแค่ไหน?",PL:"Jak mocno naciskać na początku?",EN:"How hard to press at first?"},a:{PL:"Zacznij od około 30% siły i obserwuj oddech. Zwiększaj tylko po zgodzie.",TH:"เริ่มที่ประมาณ 30% แล้วสังเกตลมหายใจ เพิ่มแรงเมื่อได้รับความยินยอมเท่านั้น",EN:"Start around 30% and watch the breath. Increase only with consent.",DE:"Beginne mit etwa 30% Druck, beobachte die Atmung."}},
    {src:{TH:"ถ้าลูกค้าบอกว่าเจ็บทำอย่างไร?",PL:"Co, gdy klient mówi, że boli?",EN:"What if the client says it hurts?"},a:{PL:"Natychmiast zmniejsz nacisk, zatrzymaj się i zapytaj. Ból to sygnał.",TH:"ลดแรงกดทันที หยุด แล้วถามความรู้สึก ความเจ็บคือสัญญาณ",EN:"Reduce pressure immediately, pause and ask. Pain is a signal.",DE:"Sofort den Druck verringern, pausieren und nachfragen."}},
    {src:{TH:"ห้ามกดแรงตรงไหน?",PL:"Których miejsc nie uciskać?",EN:"Which areas to avoid?"},a:{PL:"Kolana, łokcie, kostki, kark, zgięcia stawów — pracuj wokół.",TH:"หลีกเลี่ยงเข่า ข้อศอก ข้อเท้า ต้นคอ และข้อพับ ให้ทำงานรอบๆ",EN:"Avoid knees, elbows, ankles, neck, joint creases — work around them.",DE:"Meide Knie, Ellbogen, Knöchel, Nacken und Gelenkbeugen."}},
  ];

  let lang="PL", rot=0, active=2, inLang="TH", kbi=0, nodes=[];
  const wheel=document.getElementById('wheel'), dial=document.getElementById('dial');
  const DS=600, C=DS/2, R=248;

  /* ---- real voice ---- */
  const LC={PL:"pl-PL",TH:"th-TH",EN:"en-US",DE:"de-DE"};
  function pickVoice(code){const vs=speechSynthesis.getVoices();return vs.find(v=>v.lang===code)||vs.find(v=>v.lang&&v.lang.startsWith(code.split('-')[0]))||null;}
  let speakingBtn=null;
  function speak(text,lg,btn){
    if(!('speechSynthesis' in window)){toast('Ta przeglądarka nie czyta głosem');return;}
    speechSynthesis.cancel();
    if(speakingBtn){speakingBtn.classList.remove('stop');speakingBtn.textContent=speakingBtn.dataset.label;}
    const clean=text.replace(/[„”"]/g,'');
    const u=new SpeechSynthesisUtterance(clean);
    u.lang=LC[lg]||"pl-PL"; const v=pickVoice(u.lang); if(v)u.voice=v; u.rate=.98;
    if(btn){speakingBtn=btn;btn.dataset.label=btn.dataset.label||btn.textContent;btn.classList.add('stop');btn.textContent=L[lang].stop;
      u.onend=()=>{btn.classList.remove('stop');btn.textContent=btn.dataset.label;speakingBtn=null;};}
    speechSynthesis.speak(u); toast(L[lang].speakToast);
  }
  window.speakSel=(field,btn)=>{const s=STAGES[active][lang]; speak(s[field],lang,btn);};
  if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{};}

  STAGES.forEach((s,idx)=>{const base=-90+idx*STEP,ang=base*Math.PI/180;const x=C+R*Math.cos(ang),y=C+R*Math.sin(ang);
    const b=document.createElement('div');b.className='node '+s.st;b.style.left=x+'px';b.style.top=y+'px';
    b.innerHTML=`<div class="nc">${s.i}<small>${s.t}</small></div>`;
    b.addEventListener('pointerup',(e)=>{if(!dragged){e.stopPropagation();openStage(idx);}});wheel.appendChild(b);nodes.push(b);});

  function applyRot(a){wheel.classList.toggle('snap',!!a);wheel.style.transform=`rotate(${rot}deg)`;
    nodes.forEach(nd=>{nd.querySelector('.nc').style.transform=`rotate(${-rot}deg)`;});
    const idx=((Math.round(-rot/STEP)%N)+N)%N;if(idx!==active){active=idx;renderCore();}
    nodes.forEach((nd,i)=>nd.classList.toggle('sel',i===active));}
  function spinTo(idx,animate){rot=-idx*STEP;applyRot(animate!==false);}

  function renderCore(){const s=STAGES[active],d=s[lang],T=L[lang];
    document.getElementById('core').innerHTML=`<svg class="core-lotus"><use href="#lotus"/></svg><div class="halo"></div>
      <div class="ctime">${s.t} · ${T.etap} ${active+1}/${N}</div><h2>${d.n}</h2><div class="cel">🎯 ${d.cel}</div>
      <button class="open-proc" onclick="event.stopPropagation();openStage(active)">${T.openProc}</button>
      <button class="mini-next" onclick="event.stopPropagation();nextStep()">${T.next}</button>`;}

  window.openStage=(idx)=>{active=idx;spinTo(idx,true);renderCore();renderStage();
    document.getElementById('stageModal').classList.add('open');document.getElementById('scrim').classList.add('open');};
  function renderStage(){const s=STAGES[active],d=s[lang],T=L[lang];
    const media = s.video ? `<div class="st-media"><iframe src="${s.video}" allowfullscreen></iframe></div>`
      : `<div class="st-media"><div class="pl">🎬</div><small>${T.media}</small><small style="opacity:.7">${T.mediaHint}</small></div>`;
    const qrows = d.q.map(q=>`<div class="qrow"><div class="qtxt">${q}</div><button class="qspeak" onclick="speak('${q.replace(/'/g,"\\'")}','${lang}',this)">🔊</button></div>`).join('');
    document.getElementById('stageBody').innerHTML=`
      <div class="mhead"><div class="mtitle"><svg class="lot"><use href="#lotus"/></svg> ${T.etap} ${active+1}/${N}</div><div class="mclose" onclick="closeStage()">${T.close}</div></div>
      <div class="st-medallion"><div class="st-badge">${s.i}</div><div class="st-time">${s.t} · ${s.dur}</div><div class="st-name">${d.n}</div><div class="st-goal">🎯 ${d.cel}</div></div>
      ${media}
      <div style="text-align:center;margin:-4px 0 12px"><button class="ask" style="border-color:#e6dccb;color:var(--gold-d)" onclick="openPdf()">📄 ${T.pdfBtn}</button></div>
      <div class="st-sec agent"><div class="lab"><span class="ic">💬</span> ${T.sec.agent}</div><p>„${d.agent}”</p><button class="speak" data-label="${T.listen}" onclick="speakSel('agent',this)">${T.listen}</button></div>
      <div class="st-sec"><div class="lab"><span class="ic">🖐️</span> ${T.sec.maliwan}</div><p>${d.maliwan}</p></div>
      <div class="st-sec"><div class="lab"><span class="ic">🧑‍🎓</span> ${T.sec.kursanci}</div><p>${d.kursanci}</p></div>
      <div class="st-sec warn"><div class="lab"><span class="ic">⚠️</span> ${T.sec.uwaga}</div><p>${d.uwaga}</p></div>
      <div class="st-sec"><div class="lab"><span class="ic">❓</span> ${T.qhead}</div><div class="qlist">${qrows}</div></div>
      <div class="st-sec sum"><div class="lab"><span class="ic">🌸</span> ${T.sec.sum}</div><p>${d.sum}</p><button class="speak" data-label="${T.listen}" onclick="speakSel('sum',this)">${T.listen}</button></div>
      <div class="st-foot"><button class="ask" onclick="openTr()">🪷</button><button class="go" onclick="nextStep(true)">${T.next}</button></div>`;}
  function closeStage(){speechSynthesis.cancel();document.getElementById('stageModal').classList.remove('open');document.getElementById('scrim').classList.remove('open');}
  window.closeStage=closeStage;
  window.openPdf=()=>{const p=STAGES[active].pdf;if(p)window.open(p,'_blank');else toast(L[lang].pdfSoon);};

  function nextStep(fromPanel){if(active<N-1){active++;spinTo(active,true);renderCore();if(fromPanel||document.getElementById('stageModal').classList.contains('open')){renderStage();document.getElementById('stageModal').classList.add('open');document.getElementById('scrim').classList.add('open');}toast('✅ → '+STAGES[active].t+' '+STAGES[active][lang].n);}else toast(L[lang].lastStep);}
  window.nextStep=nextStep;

  function renderStatic(){const T=L[lang];
    document.getElementById('tagline').innerHTML=T.tag;
    document.getElementById('dLive').textContent=T.live;
    document.getElementById('dRec').textContent=T.rec;
    document.getElementById('note').innerHTML=T.note;
    document.getElementById('legend').innerHTML=[["--mint",0],["--rose",1],["--sky-soft",2],["gold",3]].map(([c,i])=>{
      const sw=c==="gold"?'style="outline:2px solid var(--gold);background:#fff"':`style="background:var(${c})"`;
      return `<div class="lg-item"><span class="swatch" ${sw}></span> ${T.leg[i]}</div>`;}).join('');
    document.getElementById('trTitle').textContent=T.trTitle;document.getElementById('trKb').textContent=T.trKb;
    document.getElementById('micB').textContent=T.micB;document.getElementById('micD').textContent=T.micD;
    document.getElementById('inLabel').textContent=T.inLabel;document.getElementById('simBtn').textContent=T.sim;
    document.getElementById('trClose').textContent=T.close;document.getElementById('recClose').textContent=T.close;
    document.getElementById('recTitle').textContent=T.recTitle;document.getElementById('recSub').textContent=T.recSub;}
  window.setLang=(lg)=>{lang=lg;document.documentElement.lang=(lg==="TH"?"th":"pl");speechSynthesis.cancel();
    document.getElementById('lPL').classList.toggle('on',lg==="PL");document.getElementById('lTH').classList.toggle('on',lg==="TH");
    renderStatic();renderCore();buildRec();
    if(document.getElementById('stageModal').classList.contains('open'))renderStage();
    if(document.getElementById('trBody').innerHTML.trim())simulate();
    toast(L[lang].langToast);};

  /* drag to spin */
  let dragging=false,dragged=false,startAng=0,startRot=0,lastAng=0,vel=0,lastT=0,raf=null;
  function angleAt(e){const r=dial.getBoundingClientRect();return Math.atan2(e.clientY-(r.top+r.height/2),e.clientX-(r.left+r.width/2))*180/Math.PI;}
  dial.addEventListener('pointerdown',(e)=>{if(e.target.closest('.core'))return;dragging=true;dragged=false;cancelAnimationFrame(raf);
    wheel.classList.remove('snap');wheel.classList.add('grab');startAng=angleAt(e);startRot=rot;lastAng=startAng;lastT=performance.now();dial.setPointerCapture(e.pointerId);});
  dial.addEventListener('pointermove',(e)=>{if(!dragging)return;const a=angleAt(e);let d=a-startAng;rot=startRot+d;
    const now=performance.now();vel=(a-lastAng)/Math.max(1,now-lastT);lastAng=a;lastT=now;if(Math.abs(d)>4)dragged=true;applyRot(false);});
  function endDrag(){if(!dragging)return;dragging=false;wheel.classList.remove('grab');let v=vel*16;
    (function glide(){if(Math.abs(v)>0.25){rot+=v;v*=0.94;applyRot(false);raf=requestAnimationFrame(glide);}else{rot=Math.round(rot/STEP)*STEP;applyRot(true);}})();}
  dial.addEventListener('pointerup',endDrag);dial.addEventListener('pointercancel',endDrag);
  dial.addEventListener('wheel',(e)=>{e.preventDefault();cancelAnimationFrame(raf);rot+=(e.deltaY>0?-STEP:STEP);rot=Math.round(rot/STEP)*STEP;applyRot(true);},{passive:false});

  /* translator */
  window.setIn=(el)=>{document.querySelectorAll('.lgpill').forEach(x=>x.classList.remove('on'));el.classList.add('on');inLang=el.dataset.l;};
  window.simulate=()=>{const item=KB[kbi%KB.length];kbi++;const q=item.src[inLang]||item.src.EN;const T=L[lang];
    const cards=[["th","🇹🇭 ไทย","TH"],["en","🇬🇧 English","EN"],["pl","🇵🇱 Polski","PL"],["de","🇩🇪 Deutsch","DE"]].map(([c,fl,code])=>`<div class="acard ${c}"><div class="fl">${fl}<button class="sp" onclick="speak(this.parentNode.parentNode.dataset.t,'${code}',this)">🔊</button></div><span>${item.a[code]}</span><div style="display:none"></div></div>`.replace('<div style="display:none"></div>','')).join('');
    document.getElementById('trBody').innerHTML=`<div class="qbubble"><div class="who">${T.who} (${inLang})</div>${q}</div><div class="arrow">${T.arrow}</div><div class="agrid" id="agrid">${cards}</div>`;
    const grid=document.getElementById('agrid');[["TH"],["EN"],["PL"],["DE"]].forEach((c,i)=>{grid.children[i].dataset.t=item.a[c[0]];});
    toast(T.ansToast);};
  function openTr(){document.getElementById('trModal').classList.add('open');document.getElementById('scrim').classList.add('open');if(!document.getElementById('trBody').innerHTML.trim())simulate();}
  function closeTr(){speechSynthesis.cancel();document.getElementById('trModal').classList.remove('open');if(!document.getElementById('stageModal').classList.contains('open'))document.getElementById('scrim').classList.remove('open');}
  window.openTr=openTr;window.closeTr=closeTr;

  function buildRec(){const bars='<div class="wave">'+Array.from({length:14}).map(()=>'<i></i>').join('')+'</div>';const T=L[lang];
    document.getElementById('recList').innerHTML=STAGES.map((s,i)=>`<div class="rec" id="rec${i}"><button class="play" onclick="togglePlay(${i})">▶</button><div class="rinfo"><div class="rname">${s.t} · ${s[lang].n}</div><div class="rmeta">${T.recMeta} · ${s.dur} · PL/TH/EN</div>${bars}</div><button class="dl" onclick="speak(STAGES[${i}]['${lang}'].agent,lang,this)">🔊</button></div>`).join('');}
  window.togglePlay=(i)=>{const row=document.getElementById('rec'+i);const on=row.classList.toggle('playing');row.querySelector('.play').textContent=on?'⏸':'▶';
    document.querySelectorAll('.rec').forEach((r,j)=>{if(j!==i){r.classList.remove('playing');r.querySelector('.play').textContent='▶';}});
    if(on){speak(STAGES[i][lang].agent,lang);}else{speechSynthesis.cancel();}};
  function openRec(){document.getElementById('recModal').classList.add('open');document.getElementById('scrim').classList.add('open');}
  function closeRec(){speechSynthesis.cancel();document.getElementById('recModal').classList.remove('open');document.getElementById('scrim').classList.remove('open');}
  window.openRec=openRec;window.closeRec=closeRec;
  window.closeAll=()=>{closeStage();closeTr();closeRec();document.getElementById('scrim').classList.remove('open');};

  let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2200);}
  window.toast=toast;

  renderStatic();buildRec();rot=-active*STEP;applyRot(false);renderCore();
</script>
</body>
</html>
